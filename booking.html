<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#dfe6e9;
}

/* HEADER */
header{
  background:#0a8f08;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 60px;
  flex-wrap: wrap;
}

header h1{
  font-size:2rem; /* responsive */
  margin-bottom:10px;
}

nav{
  display:flex;
  gap:15px;
  flex-wrap: wrap;
}

nav li{
  list-style:none;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:bold;
  font-size:1rem;
}

/* MAIN SECTION */
.container{
  display:flex;
  justify-content:space-between;
  padding:70px 100px;
  flex-wrap: wrap;
  gap:20px;
}

/* LEFT SIDE */
.left{
  flex:1 1 300px;   /* flexible width */
  max-width:500px;
  margin-bottom:30px;
}

.left h2{
  font-size:2.5rem; /* responsive */
  color:#0a8f08;
  margin-bottom:20px;
}

.info{
  margin-top:30px;
  font-size:1rem;
}

.info p{
  margin-bottom:20px;
}

/* RIGHT SIDE */
.right{
  flex:1 1 300px;
  max-width:500px;
  background:#eeeeee;
  padding:30px;
  border-radius:12px;
  margin-bottom:30px;
}

/* FORM */
input, select{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:1rem;
}

/* BUTTON */
button{
  background:#0a8f08;
  color:white;
  border:none;
  padding:15px;
  width:80%;
  max-width:200px;
  border-radius:8px;
  font-size:1.1rem;
  cursor:pointer;
  display:block;
  margin:20px auto;
}

button:hover{
  background:#066606;
}

.message{
  margin-top:10px;
  font-weight:bold;
  text-align:center;
}

/* MOBILE / TABLET RESPONSIVE */
@media (max-width:900px){
  .container{
    flex-direction: column;
    align-items: center;
    padding:40px 20px;
  }

  .left, .right{
    width:90%;
  }

  header{
    padding:15px 20px;
    flex-direction: column;
    align-items:flex-start;
    gap:10px;
  }

  nav{
    gap:10px;
  }

  .left h2{
    font-size:2rem;
  }

  input, select{
    font-size:0.95rem;
    padding:12px;
  }

  button{
    width:100%;
  }
}

@media (max-width:500px){
  .left h2{
    font-size:1.8rem;
  }

  .info{
    font-size:0.9rem;
  }

  header h1{
    font-size:1.5rem;
  }
}
</style>
</head>

<body>

<header>
<h1>Christian Medical Clinic</h1>
 
<nav>
<li><a href="index.html">Home</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="booking.html">Book Appointment</a></li>
</nav>
</header>

<section class="container">

<!-- LEFT SIDE -->
<div class="left">
<h2>Book Appointment</h2>
<p>Schedule your visit with our medical professionals.</p>

<div class="info">
<p>📞 +63 912 345 6789</p>
<p>📧 christianclinic@email.com</p>
<p>📍 123 Main Street, Your City</p>
</div>
</div>

<!-- RIGHT SIDE FORM -->
<div class="right">
<form id="bookingForm">
<input type="text" name="fullname" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="text" name="phone" placeholder="Phone Number" required>

<select name="service" required>
<option value="">Select Service</option>
<option value="Consultation">Consultation</option>
<option value="Dental">Dental</option>
<option value="Pediatrics">Pediatrics</option>
<option value="Vaccination">Vaccination</option>
</select>

<input type="date" name="date" required>

<select name="time" required>
    <option value="">Select Time</option>
    <option value="08:00">8:00 AM</option>
    <option value="09:00">9:00 AM</option>
    <option value="10:00">10:00 AM</option>
    <option value="11:00">11:00 AM</option>
    <option value="13:00">1:00 PM</option>
    <option value="14:00">2:00 PM</option>
    <option value="15:00">3:00 PM</option>
    <option value="16:00">4:00 PM</option>
</select>

<button type="submit">Book Appointment</button>
<div class="message" id="message"></div>
</form>
</div>

</section>

<script>
const form = document.getElementById('bookingForm');
const messageDiv = document.getElementById('message');

form.addEventListener('submit', function(e) {
    e.preventDefault();

    let formData = new FormData(form);
    let data = Object.fromEntries(formData.entries());

    // Get existing bookings
    let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

    // Add new booking
    bookings.push(data);

    // Save to localStorage
    localStorage.setItem("bookings", JSON.stringify(bookings));

    // Show success message
    messageDiv.textContent = "Appointment booked successfully!";

    // Clear form
    form.reset();
});
</script>
</body>
</html>
