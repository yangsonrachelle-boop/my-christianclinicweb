<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>

body {
    background: #f4fefe;
    font-family: "Segoe UI", Tahoma, sans-serif;
    margin: 0;
    padding: 0;
}

header {
    background: #00861d;
    color: #fff;
    padding: 20px 0;
}

header .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
}

header a {
    color: #fff;
    text-decoration: none;
}

section.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
}

h3 {
    color: #117b0b;
    margin-bottom: 20px;
}

.date-section {
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 8px;
}

.date-header {
    background: #0a8f08;
    color: white;
    padding: 10px 15px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    border-radius: 8px 8px 0 0;
}

.date-content {
    padding: 10px 15px;
    display: block; /* can toggle */
}

.msg-box {
    background: #fff;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    box-shadow: 0 3px 6px rgba(0,0,0,0.08);
}

.msg-box p {
    margin: 3px 0;
}

.delete-btn {
    margin-top: 5px;
    background: #dc3545;
    color: #fff;
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
}

.delete-btn:hover {
    background: #b52a37;
}

.date-counter {
    font-weight: bold;
}

</style>
</head>
<body>

<header>
<div class="container">
<h2>Admin Dashboard</h2>
<a href="index.html">Logout</a>
</div>
</header>

<section class="container">

<h3>Patient Messages</h3>
<div id="messages"></div>

<h3>Booked Appointments</h3>
<div id="appointments"></div>

</section>

<script>

/* =========================
   CONTACT MESSAGES
========================= */

let messages = JSON.parse(localStorage.getItem("messages")) || [];
let messagesContainer = document.getElementById("messages");

if (messages.length === 0) {
    messagesContainer.innerHTML = "<p>No messages yet.</p>";
} else {
    messages.forEach((msg, index) => {
        messagesContainer.innerHTML += `
            <div class="msg-box">
                <p><strong>Name:</strong> ${msg.name}</p>
                <p><strong>Email:</strong> ${msg.email}</p>
                <p>${msg.message}</p>
                <button class="delete-btn" onclick="deleteMessage(${index})">Delete</button>
            </div>
        `;
    });
}

function deleteMessage(index) {
    let messages = JSON.parse(localStorage.getItem("messages")) || [];
    if (confirm("Are you sure you want to delete this message?")) {
        messages.splice(index, 1);
        localStorage.setItem("messages", JSON.stringify(messages));
        location.reload();
    }
}

/* =========================
   APPOINTMENTS
========================= */

async function loadAppointments(){
    const response = await fetch("/appointments");
    const data = await response.json();

    const container = document.getElementById("appointments");
    container.innerHTML = ""; // clear previous

    if(data.length === 0){
        container.innerHTML = "<p>No appointments yet.</p>";
        return;
    }

    // Group by date
    const groupedByDate = {};
    data.forEach(app => {
        if(!groupedByDate[app.date]) groupedByDate[app.date] = [];
        groupedByDate[app.date].push(app);
    });

    Object.keys(groupedByDate).sort().forEach(date => {
        const section = document.createElement("div");
        section.className = "date-section";

        const header = document.createElement("div");
        header.className = "date-header";
        header.innerHTML = `<span>Date: ${date}</span> <span class="date-counter">${groupedByDate[date].length} / 100</span>`;
        section.appendChild(header);

        // DELETE ALL BUTTON
        const deleteAllBtn = document.createElement("button");
        deleteAllBtn.textContent = "Delete All";
        deleteAllBtn.className = "delete-btn";
        deleteAllBtn.style.marginLeft = "10px";
        deleteAllBtn.onclick = async () => {
            if(!confirm(`Are you sure you want to delete all appointments for ${date}?`)) return;

            let updatedAppointments = data.filter(app => app.date !== date);

            await fetch("/update-appointments", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(updatedAppointments)
            });

            loadAppointments();
        };
        header.appendChild(deleteAllBtn);

        const content = document.createElement("div");
        content.className = "date-content";

        // Group by time slot within the date
        const groupedByTime = {};
        groupedByDate[date].forEach(app => {
            if(!groupedByTime[app.time]) groupedByTime[app.time] = [];
            groupedByTime[app.time].push(app);
        });

        // Sort times chronologically
        Object.keys(groupedByTime).sort().forEach(time => {
            const timeHeader = document.createElement("div");
            timeHeader.style.fontWeight = "bold";
            timeHeader.textContent = `${time} → ${groupedByTime[time].length} / 12 booked`;
            content.appendChild(timeHeader);

            groupedByTime[time].forEach((app, index) => {
                const div = document.createElement("div");
                div.className = "msg-box";
                div.innerHTML = `
                    <p><strong>Name:</strong> ${app.fullname}</p>
                    <p><strong>Email:</strong> ${app.email}</p>
                    <p><strong>Phone:</strong> ${app.phone}</p>
                    <p><strong>Service:</strong> ${app.service}</p>
                    <button class="delete-btn" onclick="deleteAppointmentByTime('${date}','${time}',${index})">Delete</button>
                `;
                content.appendChild(div);
            });
        });

        section.appendChild(content);
        container.appendChild(section);

        // Toggle collapse
        header.addEventListener('click', () => {
            content.style.display = content.style.display === 'none' ? 'block' : 'none';
        });
    });
}

// DELETE APPOINTMENT BY DATE & TIME
async function deleteAppointmentByTime(date, time, index){
    if(!confirm("Are you sure you want to delete this appointment?")) return;

    const response = await fetch("/appointments");
    let data = await response.json();

    // Find correct appointment by date and time
    let count = -1;
    for(let i = 0; i < data.length; i++){
        if(data[i].date === date && data[i].time === time) count++;
        if(count === index){
            data.splice(i,1);
            break;
        }
    }

    await fetch("/update-appointments", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    loadAppointments();
}

// Initial load
loadAppointments();

</script>

</body>
</html>
